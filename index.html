<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#c98a5e">
<title>Accountabuddy 💛</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Accountabuddy">
<style>
/* =========================================================================
   ACCOUNTABUDDY — warm "cream & latte" aesthetic
   -------------------------------------------------------------------------
   Alani may want to tweak colours later. The whole palette lives in :root
   below — change a value here and it updates everywhere in the app.
   ========================================================================= */
:root{
  /* Backgrounds */
  --bg:        #f3e9db;   /* soft cream page background */
  --bg-2:      #ece0cf;   /* slightly deeper cream (edges/gradients) */
  --card:      #fdf8f1;   /* card surface — like fresh cream */
  --card-2:    #f7efe2;   /* secondary surface */

  /* Text */
  --ink:       #3c2f27;   /* warm dark-coffee text */
  --ink-soft:  #7d6d5f;   /* muted brown for secondary text */
  --ink-faint: #a89684;   /* faint labels */

  /* Accents (coffee / caramel / gold) */
  --latte:     #c98a5e;   /* caramel — primary accent */
  --latte-dk:  #a9683f;   /* deeper coffee for hover/press */
  --gold:      #e6b365;   /* golden fairy-light glow */
  --gold-soft: #f3d9a6;
  --cream-line:#e6d8c4;   /* hairline borders */

  /* Per-person colours (kept warm & earthy so they always fit the theme) */
  --alani:     #c98a5e;   /* caramel */
  --alani-bg:  #f7e9d8;
  --buhle:     #93a679;   /* sage green */
  --buhle-bg:  #e8eede;

  /* Feedback */
  --good:      #8aa06b;   /* gentle sage-green for wins (never harsh red) */
  --warn:      #d99a5b;   /* warm amber for nudges (not alarming red) */
  --shadow:    0 6px 22px rgba(90,60,35,.10);
  --shadow-sm: 0 2px 8px rgba(90,60,35,.08);
  --radius:    18px;
  --radius-sm: 12px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 500px at 100% -10%, rgba(230,179,101,.18), transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  background-repeat:no-repeat;
  min-height:100dvh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
/* Elegant serif for headings — echoes the "do it for your future self" vibe */
h1,h2,h3,.serif{ font-family:Georgia,"Times New Roman",serif; font-weight:600; letter-spacing:.2px; }
h1{ font-size:1.5rem; margin:.2em 0; }
h2{ font-size:1.25rem; margin:.1em 0 .4em; }
h3{ font-size:1.05rem; margin:0 0 .3em; }
p{ margin:.4em 0; }
button{ font-family:inherit; cursor:pointer; }
a{ color:var(--latte-dk); }
.hidden{ display:none !important; }

/* ---------- Buttons ---------- */
.btn{
  border:none; border-radius:999px; padding:12px 20px; font-size:1rem; font-weight:600;
  background:linear-gradient(180deg,var(--latte),var(--latte-dk)); color:#fff;
  box-shadow:var(--shadow-sm); transition:transform .06s ease, filter .15s ease;
}
.btn:active{ transform:translateY(1px) scale(.99); }
.btn:hover{ filter:brightness(1.04); }
.btn.ghost{ background:transparent; color:var(--latte-dk); box-shadow:none; border:1.5px solid var(--cream-line); }
.btn.gold{ background:linear-gradient(180deg,var(--gold),#d99a45); color:#4a3316; }
.btn.block{ display:block; width:100%; }
.btn.sm{ padding:8px 14px; font-size:.9rem; }
.btn:disabled{ opacity:.5; cursor:default; }

/* ---------- Login ---------- */
#loginView{ min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:22px; }
.login-card{
  width:100%; max-width:380px; background:var(--card); border-radius:26px; overflow:hidden;
  box-shadow:var(--shadow); border:1px solid var(--cream-line);
}
.login-hero{ position:relative; }
.login-hero img{ width:100%; height:190px; object-fit:cover; display:block; }
.login-hero .veil{
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(60,40,25,.05), rgba(60,40,25,.45));
}
.login-hero .title{
  position:absolute; left:0; right:0; bottom:12px; text-align:center; color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,.4);
}
.login-hero .title h1{ font-size:1.7rem; margin:0; }
.login-hero .title p{ margin:2px 0 0; font-size:.85rem; opacity:.95; }
.login-body{ padding:20px 20px 24px; }
.login-body label{ font-size:.85rem; color:var(--ink-soft); display:block; margin:10px 0 4px; }
input,select,textarea{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm);
  border:1.5px solid var(--cream-line); background:#fff; color:var(--ink); font-size:1rem;
  font-family:inherit;
}
input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--latte); box-shadow:0 0 0 3px rgba(201,138,94,.15); }
.login-hint{ font-size:.8rem; color:var(--ink-faint); text-align:center; margin-top:14px; }
.login-err{ color:#b0603a; font-size:.85rem; text-align:center; margin-top:10px; min-height:1em; }

/* ---------- App shell ---------- */
#appView{ max-width:720px; margin:0 auto; padding:0 0 96px; }
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:10px; padding:12px 16px calc(12px + env(safe-area-inset-top,0));
  padding-top:max(12px, env(safe-area-inset-top,0));
  background:rgba(253,248,241,.86); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--cream-line);
}
.topbar .brand{ font-family:Georgia,serif; font-weight:700; font-size:1.15rem; display:flex; align-items:center; gap:6px; }
.topbar .spacer{ flex:1; }
.me-badge{
  display:flex; align-items:center; gap:8px; padding:5px 10px 5px 6px; border-radius:999px;
  background:var(--card-2); border:1px solid var(--cream-line); font-size:.85rem; font-weight:600;
}
.avatar{ width:26px; height:26px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:.85rem; font-weight:700; }
.sync-status{ display:flex; align-items:center; gap:6px; font-size:.72rem; color:var(--ink-faint); }
.sync-dot{ width:8px; height:8px; border-radius:50%; background:#c9b79c; }
.sync-status.ok .sync-dot{ background:var(--good); }
.sync-status.busy .sync-dot{ background:var(--gold); animation:pulse 1s infinite; }
.sync-status.off .sync-dot{ background:#c68b6b; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

/* Horizontal scrolling tab bar (works great on phones) */
.tabs{
  position:sticky; top:0; z-index:20; display:flex; gap:8px; overflow-x:auto; padding:10px 14px;
  background:rgba(243,233,219,.9); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--cream-line); scrollbar-width:none;
}
.tabs::-webkit-scrollbar{ display:none; }
.tab{
  flex:0 0 auto; border:1px solid var(--cream-line); background:var(--card); color:var(--ink-soft);
  padding:8px 14px; border-radius:999px; font-size:.88rem; font-weight:600; white-space:nowrap;
}
.tab.active{ background:linear-gradient(180deg,var(--latte),var(--latte-dk)); color:#fff; border-color:transparent; box-shadow:var(--shadow-sm); }

.wrap{ padding:16px; }
section{ animation:fade .25s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none} }

/* ---------- Cards ---------- */
.card{
  background:var(--card); border:1px solid var(--cream-line); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow-sm); margin-bottom:14px;
}
.card.pad-0{ padding:0; overflow:hidden; }
.banner{ position:relative; }
.banner img{ width:100%; height:140px; object-fit:cover; display:block; }
.banner .cap{
  position:absolute; left:14px; bottom:10px; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.5);
  font-family:Georgia,serif; font-size:1.25rem; font-weight:600;
}
.banner .veil{ position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%, rgba(50,33,20,.55)); }
.muted{ color:var(--ink-soft); }
.faint{ color:var(--ink-faint); font-size:.82rem; }
.center{ text-align:center; }
.row{ display:flex; gap:10px; align-items:center; }
.row.wrap-r{ flex-wrap:wrap; }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.section-title{ display:flex; align-items:center; gap:8px; margin:2px 0 12px; }
.section-title .emoji{ font-size:1.3rem; }

/* Form fields */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:.9rem; font-weight:600; color:var(--ink); margin-bottom:6px; }
.field .help{ font-size:.78rem; color:var(--ink-faint); font-weight:400; }

/* Toggle (✓/✗) */
.toggle{
  display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:999px;
  border:1.5px solid var(--cream-line); background:#fff; font-weight:600; color:var(--ink-soft);
  user-select:none;
}
.toggle.on{ background:var(--good); color:#fff; border-color:transparent; }
.toggle .ic{ font-size:1.1rem; }

/* Stepper / scale */
.scale{ display:flex; gap:6px; flex-wrap:wrap; }
.scale button{
  width:38px; height:38px; border-radius:12px; border:1.5px solid var(--cream-line);
  background:#fff; color:var(--ink-soft); font-weight:700; font-size:.95rem;
}
.scale button.sel{ background:linear-gradient(180deg,var(--gold),#d99a45); color:#4a3316; border-color:transparent; }
.meals .scale button.sel{ background:var(--good); color:#fff; }

/* Chips (subjects) */
.chips{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{
  padding:7px 12px; border-radius:999px; border:1.5px solid var(--cream-line); background:#fff;
  font-size:.85rem; font-weight:600; color:var(--ink-soft);
}
.chip.sel{ background:var(--latte-bg,#f7e9d8); border-color:var(--latte); color:var(--latte-dk); }

/* Stat tiles */
.stat{ background:var(--card-2); border-radius:var(--radius-sm); padding:12px; text-align:center; border:1px solid var(--cream-line); }
.stat .num{ font-family:Georgia,serif; font-size:1.5rem; font-weight:700; color:var(--latte-dk); }
.stat .lbl{ font-size:.72rem; color:var(--ink-soft); margin-top:2px; }

/* Points / leaderboard */
.vs{ display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; }
.player{ text-align:center; padding:14px 8px; border-radius:var(--radius); border:1px solid var(--cream-line); }
.player .big{ font-family:Georgia,serif; font-size:2.4rem; font-weight:700; line-height:1; }
.player .who{ font-weight:700; margin-top:6px; }
.vs .mid{ font-family:Georgia,serif; color:var(--ink-faint); font-size:1.1rem; }
.crown{ font-size:1.3rem; }
.bar{ height:10px; background:var(--card-2); border-radius:999px; overflow:hidden; border:1px solid var(--cream-line); }
.bar > span{ display:block; height:100%; border-radius:999px; }

/* Badges / alerts */
.alert{
  display:flex; gap:10px; align-items:flex-start; padding:12px 14px; border-radius:var(--radius-sm);
  background:#fbeede; border:1px solid #efcfa2; color:#7a4e24; margin-bottom:12px; font-size:.92rem;
}
.alert.calm{ background:var(--card-2); border-color:var(--cream-line); color:var(--ink-soft); }
.pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:.74rem; font-weight:700; }
.pill.pending{ background:var(--gold-soft); color:#7a5518; }
.pill.completed{ background:#dcecc9; color:#4d6a2c; }
.pill.overdue{ background:#f2d5c2; color:#9a4a24; }

/* List items */
.item{ display:flex; gap:10px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--cream-line); }
.item:last-child{ border-bottom:none; }
.item .grow{ flex:1; }
.icon-btn{ border:none; background:transparent; font-size:1.1rem; color:var(--ink-faint); padding:6px; border-radius:10px; }
.icon-btn:hover{ background:var(--card-2); color:var(--ink); }

/* Check-off circle for goals */
.check{
  width:26px; height:26px; border-radius:50%; border:2px solid var(--cream-line); background:#fff;
  display:grid; place-items:center; font-size:.9rem; color:transparent; flex:0 0 auto;
}
.check.on{ background:var(--good); border-color:transparent; color:#fff; }

/* View toggle (me / buddy) */
.seg{ display:inline-flex; background:var(--card-2); border-radius:999px; padding:4px; border:1px solid var(--cream-line); }
.seg button{ border:none; background:transparent; padding:7px 16px; border-radius:999px; font-weight:600; color:var(--ink-soft); font-size:.9rem; }
.seg button.on{ background:#fff; color:var(--ink); box-shadow:var(--shadow-sm); }

/* Agreement page */
.pact{ font-size:1.05rem; }
.pact li{ margin:8px 0; }
.motto{ font-family:Georgia,serif; font-style:italic; font-size:1.15rem; text-align:center; color:var(--latte-dk); margin-top:14px; }

/* Toast */
#toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:12px 18px; border-radius:999px; font-weight:600;
  box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:all .3s ease; z-index:60; max-width:90vw; text-align:center;
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* Confetti dots */
.confetti{ position:fixed; inset:0; pointer-events:none; z-index:55; overflow:hidden; }
.confetti i{ position:absolute; width:9px; height:9px; border-radius:2px; top:-12px; animation:fall linear forwards; }
@keyframes fall{ to{ transform:translateY(105vh) rotate(540deg); opacity:.9; } }

/* Bottom quick-nav */
.botnav{
  position:fixed; left:0; right:0; bottom:0; z-index:40; display:flex; justify-content:space-around;
  background:rgba(253,248,241,.94); backdrop-filter:blur(10px); border-top:1px solid var(--cream-line);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom,0));
}
.botnav button{ border:none; background:transparent; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 10px; color:var(--ink-faint); font-size:.68rem; font-weight:600; border-radius:12px; }
.botnav button .bi{ font-size:1.25rem; }
.botnav button.on{ color:var(--latte-dk); }

.hr{ height:1px; background:var(--cream-line); margin:14px 0; border:none; }
.small{ font-size:.85rem; }
.tag{ display:inline-block; background:var(--card-2); border:1px solid var(--cream-line); border-radius:999px; padding:2px 10px; font-size:.78rem; color:var(--ink-soft); margin:2px 3px 0 0; }
</style>
</head>
<body>

<!-- ============================ LOGIN ============================ -->
<div id="loginView">
  <div class="login-card">
    <div class="login-hero">
      <img src="images/squad.png" alt="Friends being cool together">
      <div class="veil"></div>
      <div class="title">
        <h1>Accountabuddy 💛</h1>
        <p>Better together, all matric year</p>
      </div>
    </div>
    <div class="login-body">
      <label for="luser">Who are you?</label>
      <select id="luser">
        <option value="alani">Alani</option>
        <option value="buhle">Buhle</option>
      </select>
      <label for="lpass">Password</label>
      <input id="lpass" type="password" placeholder="Your name (lowercase)" autocomplete="off">
      <div class="login-err" id="loginErr"></div>
      <button class="btn block" id="loginBtn" style="margin-top:14px">Let's go →</button>
      <p class="login-hint">Just between the two of you. Be honest, be kind. ✨</p>
    </div>
  </div>
</div>

<!-- ============================ APP ============================ -->
<div id="appView" class="hidden">
  <div class="topbar">
    <span class="brand">💛 Accountabuddy</span>
    <span class="spacer"></span>
    <div class="sync-status off" id="syncStatus"><span class="sync-dot"></span><span id="syncText">Local</span></div>
    <button class="me-badge" id="meBadge" title="Log out">
      <span class="avatar" id="meAvatar">A</span><span id="meName">Alani</span>
    </button>
  </div>

  <div class="tabs" id="tabs"><!-- tabs injected by JS --></div>

  <div class="wrap" id="content"><!-- sections injected by JS --></div>

  <div class="botnav" id="botnav"><!-- quick nav injected by JS --></div>
</div>

<div id="toast"></div>

<script src="supabase.js"></script>
<script>
/* =========================================================================
   ACCOUNTABUDDY  —  main app logic
   A calm, single-file web app for two matric buddies (Alani & Buhle).
   Everything is stored per-person and synced through Supabase so each
   buddy can see the other's check-ins live.

   HOW THE DATA IS SHAPED (all editable numbers live in CONFIG below):
     DATA.alani  / DATA.buhle  = that person's private stuff:
        { checkins:{ "YYYY-MM-DD": {...} }, settings:{...}, weekly:{ "YYYY-Www": {...} } }
     DATA.shared = things the two share:
        { goals:[...], consequences:[...] }
   ========================================================================= */

/* ------------------------------------------------------------------ CONFIG */
/* ⭐ Alani — tweak-friendly settings. Change a number here and the whole app
   updates. Point values, goal defaults, seed goals and the wording all live
   in this one block. */
const CONFIG = {
  /* Login (kept deliberately simple — this is a private tool, not a bank). */
  accounts: { alani: 'alani', buhle: 'buhle' },

  /* Points awarded from each day's check-in. */
  points: {
    perStudyHour:      1,   // +1 for every hour studied
    gym:               3,   // gym session completed
    waterGoal:         1,   // hit your water goal
    sleep8:            2,   // slept 8+ hours
    underScreen:       2,   // stayed under your screen-time goal
    healthyEating:     2,   // 3/3 healthy meals
    wokeOnTime:        1,   // woke up on time
    allTasksDone:      5,   // completed everything you planned
  },
  /* Weekly bonus challenges (checked across the whole week). */
  weeklyBonus: {
    studiedEveryDay:   10,  // studied on every planned day
    everyGym:          10,  // did every planned gym session
    avgSleep8:         10,  // averaged 8+ hours of sleep
    underScreenAll:    10,  // under screen goal every day
  },

  /* Default personal goals/targets (each person can change these in Settings). */
  defaultSettings: {
    waterGoal:   2.0,       // litres
    screenGoal:  3.0,       // hours of screen time to stay under
    plannedGym:  3,         // gym sessions you aim for per week
    plannedStudyDays: 5,    // study days you aim for per week
  },

  /* Subjects offered as quick tags on the check-in (add/remove freely). */
  subjects: ['Maths','Physics','Life Sci','English','Afrikaans','LO','History','Accounting','Geography','Business','CAT','Other'],

  /* Seed goals shown the first time (shared, editable/checkable together). */
  seedGoals: [
    'Achieve an average of ____%',
    'Get accepted into your dream university',
    'Reach your fitness goal',
    'Save R______',
    'Complete all past exam papers',
    'Build a consistent daily routine',
  ],

  /* The consequences menu (a nudge, never a punishment 💛). */
  consequenceOptions: [
    '☕ Buy your buddy a coffee or smoothie',
    '🥗 Bring your buddy a healthy snack',
    '💪 Complete 100 push-ups AND 100 sit-ups over one week',
    '📚 Study 2 extra hours during the following week',
    '📵 Stay off all social media for 24 hours',
  ],

  /* How many days back the "missed commitments" checker looks. */
  consequenceWindowDays: 7,
  thresholds: { gymMissed: 2, studyMissed: 2, checkinMissed: 3 },
  consequenceDeadlineDays: 7,
};

/* Human-friendly names & colours. */
const PEOPLE = {
  alani: { name:'Alani', color:'var(--alani)', bg:'var(--alani-bg)', initial:'A' },
  buhle: { name:'Buhle', color:'var(--buhle)', bg:'var(--buhle-bg)', initial:'B' },
};

/* --------------------------------------------------------------- APP STATE */
let ME = null, BUDDY = null;                 // 'alani' / 'buhle'
let viewUser = null;                          // whose check-ins we're looking at
let currentTab = 'home';
let DATA = blankData();                        // the whole shared dataset (both people + shared)

function blankData(){
  return {
    alani: { checkins:{}, settings:{...CONFIG.defaultSettings}, weekly:{} },
    buhle: { checkins:{}, settings:{...CONFIG.defaultSettings}, weekly:{} },
    shared:{ goals:[], consequences:[] },
  };
}

/* ------------------------------------------------------------- DATE HELPERS */
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(s,n){ const d=parseDate(s); d.setDate(d.getDate()+n); return todayStr(d); }
function prettyDate(s){ return parseDate(s).toLocaleDateString(undefined,{weekday:'short', day:'numeric', month:'short'}); }
/* ISO week key like "2026-W29" so weekly reviews line up Mon–Sun. */
function weekKey(d){
  d = d ? new Date(d) : new Date();
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = t.getUTCDay() || 7; t.setUTCDate(t.getUTCDate() + 4 - day);
  const yStart = new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wk = Math.ceil((((t - yStart)/86400000) + 1)/7);
  return t.getUTCFullYear()+'-W'+pad(wk);
}
/* The 7 date-strings (Mon..Sun) for the week containing date d. */
function weekDates(d){
  d = d ? parseDate(todayStr(d)) : new Date();
  const day = d.getDay() || 7;              // Mon=1..Sun=7
  const mon = new Date(d); mon.setDate(d.getDate() - (day-1));
  return Array.from({length:7}, (_,i)=> todayStr(new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i)));
}
function nextSunday(){
  const d = new Date(); const day = d.getDay();       // Sun=0
  const diff = (7 - day) % 7 || 7; d.setDate(d.getDate()+diff); return d;
}
function isSunday(){ return new Date().getDay() === 0; }

/* --------------------------------------------------------------- SHORTCUTS */
const $  = (s,el=document)=> el.querySelector(s);
const $$ = (s,el=document)=> [...el.querySelectorAll(s)];
/* Turn an HTML string into a node. Single-root templates return that element
   (so callers can use .append/.onclick/.children on it). Multi-root templates
   are wrapped in a plain <div> so nothing gets silently dropped. */
function el(html){
  const t=document.createElement('template'); t.innerHTML=html.trim();
  if(t.content.children.length===1) return t.content.firstElementChild;
  const d=document.createElement('div'); d.appendChild(t.content); return d;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }

/* ===========================================================================
   POINTS ENGINE  — turns a day's check-in into points (see CONFIG.points).
   =========================================================================== */
function dayPoints(u, date){
  const c = checkin(u,date); if(!c) return 0;
  const s = DATA[u].settings; const p = CONFIG.points; let pts = 0;
  pts += Math.floor(num(c.studyHours)) * p.perStudyHour;
  if(c.gym)                              pts += p.gym;
  if(num(c.water) >= num(s.waterGoal))   pts += p.waterGoal;
  if(num(c.sleep) >= 8)                  pts += p.sleep8;
  if(c.screen!=='' && c.screen!=null && num(c.screen) <= num(s.screenGoal)) pts += p.underScreen;
  if(num(c.meals) >= 3)                  pts += p.healthyEating;
  if(c.wokeOnTime)                       pts += p.wokeOnTime;
  if(c.allTasks)                         pts += p.allTasksDone;
  return pts;
}
/* Weekly bonuses across the Mon–Sun week that contains `anyDate`. */
function weekBonus(u, anyDate){
  const dates = weekDates(anyDate ? parseDate(anyDate) : new Date());
  const s = DATA[u].settings; const b = CONFIG.weeklyBonus;
  const days = dates.map(d=>checkin(u,d)).filter(Boolean);
  let bonus = 0; const earned = [];
  const studyDays = days.filter(c=> num(c.studyHours)>0).length;
  const gymDays   = days.filter(c=> c.gym).length;
  const sleeps    = days.map(c=> num(c.sleep)).filter(n=>n>0);
  const avgSleep  = sleeps.length ? sleeps.reduce((a,x)=>a+x,0)/sleeps.length : 0;
  const screenDays= days.filter(c=> c.screen!=='' && c.screen!=null);
  if(studyDays >= s.plannedStudyDays){ bonus+=b.studiedEveryDay; earned.push('🔥 Studied every planned day +'+b.studiedEveryDay); }
  if(gymDays   >= s.plannedGym){       bonus+=b.everyGym;        earned.push('🏋️ Every planned gym session +'+b.everyGym); }
  if(avgSleep  >= 8){                   bonus+=b.avgSleep8;       earned.push('😴 Averaged 8+ hrs sleep +'+b.avgSleep8); }
  if(screenDays.length===7 && screenDays.every(c=> num(c.screen) <= num(s.screenGoal))){ bonus+=b.underScreenAll; earned.push('📱 Under screen goal all week +'+b.underScreenAll); }
  return { bonus, earned };
}
function weekPoints(u, anyDate){
  const dates = weekDates(anyDate ? parseDate(anyDate) : new Date());
  let total = dates.reduce((a,d)=> a + dayPoints(u,d), 0);
  total += weekBonus(u, anyDate).bonus;
  return total;
}
function yearPoints(u){
  let total = 0;
  for(const d in DATA[u].checkins) total += dayPoints(u,d);
  // add each distinct week's bonus once
  const weeks = new Set(Object.keys(DATA[u].checkins).map(d=>weekKey(parseDate(d))));
  for(const wk of weeks){
    // find a date in that week to compute the bonus
    const anyDate = Object.keys(DATA[u].checkins).find(d=> weekKey(parseDate(d))===wk);
    if(anyDate) total += weekBonus(u, anyDate).bonus;
  }
  return total;
}

/* Weekly auto-stats for the review page. */
function weekStats(u, anyDate){
  const dates = weekDates(anyDate ? parseDate(anyDate) : new Date());
  const s = DATA[u].settings;
  const days = dates.map(d=>checkin(u,d)).filter(Boolean);
  const sum = (f)=> days.reduce((a,c)=> a + num(f(c)), 0);
  const sleeps = days.map(c=>num(c.sleep)).filter(n=>n>0);
  const screens= days.map(c=>c.screen).filter(v=> v!=='' && v!=null).map(num);
  return {
    studyHours: sum(c=>c.studyHours),
    avgSleep:   sleeps.length ? (sleeps.reduce((a,x)=>a+x,0)/sleeps.length) : 0,
    gymCount:   days.filter(c=>c.gym).length,
    avgScreen:  screens.length ? (screens.reduce((a,x)=>a+x,0)/screens.length) : 0,
    waterDays:  days.filter(c=> num(c.water)>=num(s.waterGoal)).length,
    healthyDays:days.filter(c=> num(c.meals)>=3).length,
    points:     weekPoints(u, anyDate),
    checkinDays:days.length,
  };
}

/* ===========================================================================
   MISSED-COMMITMENT CHECKER  (feeds the consequences alert).
   =========================================================================== */
function missedSummary(u){
  const today = todayStr();
  let gymMissed=0, studyMissed=0, checkinMissed=0;
  for(let i=1;i<=CONFIG.consequenceWindowDays;i++){
    const d = addDays(today, -i);
    const c = checkin(u,d);
    if(!c){ checkinMissed++; continue; }
    if(!c.gym) gymMissed++;           // counted loosely; the threshold is what matters
    if(num(c.studyHours)===0) studyMissed++;
  }
  const flags = [];
  const t = CONFIG.thresholds;
  if(checkinMissed >= t.checkinMissed) flags.push(`missed ${checkinMissed} check-ins`);
  if(studyMissed   >= t.studyMissed)   flags.push(`${studyMissed} study days skipped`);
  if(gymMissed     >= t.gymMissed && DATA[u].settings.plannedGym>0) flags.push(`${gymMissed} gym days missed`);
  return { gymMissed, studyMissed, checkinMissed, flags };
}

const TABS = [
  { id:'home',        label:'🏠 Home',        bi:'🏠', short:'Home' },
  { id:'checkin',     label:'📝 Check-In',    bi:'📝', short:'Check-In' },
  { id:'evening',     label:'🌙 Evening',     bi:'🌙', short:'Evening' },
  { id:'weekly',      label:'📅 Weekly',      bi:'📅', short:'Weekly' },
  { id:'goals',       label:'🎯 Goals',       bi:'🎯', short:'Goals' },
  { id:'points',      label:'🏆 Points',      bi:'🏆', short:'Points' },
  { id:'consequences',label:'💛 Nudges',      bi:'💛', short:'Nudges' },
  { id:'agreement',   label:'🤝 Our Pact',    bi:'🤝', short:'Pact' },
  { id:'settings',    label:'⚙️ Settings',    bi:'⚙️', short:'Settings' },
];
const BOTNAV = ['home','checkin','evening','points','goals'];

function buildNav(){
  const tabs = $('#tabs'); tabs.innerHTML='';
  TABS.forEach(t=>{
    const b = el(`<button class="tab" data-tab="${t.id}">${t.label}</button>`);
    b.onclick = ()=> go(t.id);
    tabs.appendChild(b);
  });
  const bn = $('#botnav'); bn.innerHTML='';
  BOTNAV.forEach(id=>{
    const t = TABS.find(x=>x.id===id);
    const b = el(`<button data-bn="${id}"><span class="bi">${t.bi}</span>${t.short}</button>`);
    b.onclick = ()=> go(id);
    bn.appendChild(b);
  });
}
function go(tab){
  currentTab = tab;
  $$('#tabs .tab').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  $$('#botnav button').forEach(b=> b.classList.toggle('on', b.dataset.bn===tab));
  // keep the active tab in view on the horizontal strip
  const active = $(`#tabs .tab[data-tab="${tab}"]`); if(active) active.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ===========================================================================
   RENDER  — draws whichever tab is active.
   =========================================================================== */
const RENDER = {};   // one function per tab id
function render(){
  const c = $('#content');
  // Preserve nothing fancy — just redraw the active section.
  c.innerHTML = '';
  (RENDER[currentTab] || RENDER.home)(c);
}

/* Keep a tidy, typed record (numbers as numbers). Preserve any evening answers. */
function normalizeCheckin(f, evening){
  return {
    sleep:f.sleep, energy:f.energy, studyHours:f.studyHours, subjects:[...f.subjects],
    task:f.task, gym:!!f.gym, water:f.water, meals:f.meals, screen:f.screen,
    distraction:f.distraction, win:f.win, rating:f.rating, plan:f.plan,
    wokeOnTime:!!f.wokeOnTime, allTasks:!!f.allTasks,
    evening: evening || undefined,
    ts: Date.now(),
  };
}
function readonlyCheckin(u,c0){
  const card = el(`<div class="card"><div class="row" style="margin-bottom:8px"><span class="avatar" style="background:${PEOPLE[u].color}">${PEOPLE[u].initial}</span><b>${PEOPLE[u].name}'s day</b></div></div>`);
  const rows = [
    ['😴 Slept', c0.sleep? c0.sleep+' hrs':'—'], ['⚡ Energy', c0.energy? c0.energy+'/10':'—'],
    ['📚 Studied', c0.studyHours? c0.studyHours+' hrs':'—'], ['📖 Subjects', (c0.subjects&&c0.subjects.length)? c0.subjects.join(', '):'—'],
    ['⭐ Top task', c0.task||'—'], ['💪 Gym', c0.gym?'✓ Yes':'✗ No'], ['💧 Water', c0.water? c0.water+' L':'—'],
    ['🥗 Meals', (c0.meals!=null)? c0.meals+'/3':'—'], ['📱 Screen', c0.screen? c0.screen+' hrs':'—'],
    ['🎯 Distraction', c0.distraction||'—'], ['🌟 Win', c0.win||'—'], ['📊 Rated day', c0.rating? c0.rating+'/10':'—'], ['🌱 Tomorrow', c0.plan||'—'],
  ];
  rows.forEach(([k,v])=> card.append(el(`<div class="item"><div class="grow"><span class="faint">${k}</span><br>${esc(v)}</div></div>`)));
  return card;
}

function statusOf(x){
  if(x.status==='completed') return 'completed';
  return (todayStr() > x.deadline) ? 'overdue' : 'pending';
}
function consequenceRow(x, compact){
  const st = statusOf(x);
  const row = el(`<div class="item">
    <span class="avatar" style="background:${PEOPLE[x.assignedTo].color}">${PEOPLE[x.assignedTo].initial}</span>

      ${x.extra?`<div class="small" style="color:#9a4a24">➕ Added: ${esc(x.extra)}</div>`:''}
    </div>
  </div>`);
  if(!compact){
    if(x.status!=='completed'){
      const done = el(`<button class="icon-btn" title="Mark done">✅</button>`);
      done.onclick=()=>{ x.status='completed'; saveShared(); toast('🎉 Nudge completed!'); render(); };

      if(st==='overdue'){
        const more = el(`<button class="icon-btn" title="Add a consequence (overdue)">➕</button>`);
        more.onclick=()=>{ const v=prompt('Overdue! Add an additional little consequence:'); if(v){ x.extra=v.trim(); saveShared(); render(); } };

    del.onclick=()=>{ if(confirm('Remove this nudge?')){ DATA.shared.consequences=DATA.shared.consequences.filter(y=>y!==x); saveShared(); render(); } };

  return row;
}

/* ------------------------------------------------------ Supabase cloud sync */
const SYNC = { url:'https://hontxqtggrvxybamqrnh.supabase.co', key:'sb_publishable__gdf9hPZ-q7LUOkpcwkyLg_6wUW0N3y' };
let sb=null, pushTimers={}, lastTs={alani:0,buhle:0,shared:0}, applyingRemote=false;

function setSync(state,text){ const e=$('#syncStatus'); if(!e) return; e.className='sync-status '+(state||'off'); $('#syncText').textContent=text; }

/* Each owner row holds one person's data (or the shared bucket). */
function ownerPayload(owner){ return owner==='shared' ? DATA.shared : DATA[owner]; }

function schedulePush(owner){
  saveLocal();
  if(!sb){ setSync('off','Saved here'); return; }
  setSync('busy','Saving…');
  clearTimeout(pushTimers[owner]);
  pushTimers[owner]=setTimeout(()=>pushOwner(owner), 600);
}
function pushMine(){ schedulePush(ME); }
function saveShared(){ schedulePush('shared'); }

async function pushOwner(owner){
  if(!sb) return;
  try{
    const {data:row,error}=await sb.from('aab_state').upsert({owner, data:ownerPayload(owner)}).select('updated_at').single();
    if(error) throw error;
    lastTs[owner]=Date.parse(row.updated_at)||Date.now();
    setSync('ok','Synced');
  }catch(e){ setSync('off','Saved here · offline'); }
}
function applyRow(owner,data,ts){
  if(!data) return;
  applyingRemote=true;
  if(owner==='shared'){ DATA.shared.goals=data.goals||[]; DATA.shared.consequences=data.consequences||[]; }
  else { DATA[owner].checkins=data.checkins||{}; DATA[owner].weekly=data.weekly||{}; DATA[owner].settings=Object.assign({...CONFIG.defaultSettings},data.settings||{}); }
  lastTs[owner]=ts||Date.now();
  applyingRemote=false;
  saveLocal();
}
/* Don't redraw while a text field is focused (would eat keystrokes). */
function safeRender(){ const a=document.activeElement; if(a && (a.tagName==='TEXTAREA'||a.tagName==='INPUT')) return; render(); }

async function initSync(){
  if(!window.supabase){ setSync('off','Local only'); return; }
  setSync('busy','Connecting…');
  try{
    sb=window.supabase.createClient(SYNC.url, SYNC.key, {auth:{persistSession:false}});
    // Pull every row (both people + shared)
    const {data:rows,error}=await sb.from('aab_state').select('*');
    if(error) throw error;
    (rows||[]).forEach(r=> applyRow(r.owner, r.data, Date.parse(r.updated_at)||0));
    // Seed my row + shared if the cloud has nothing yet
    if(!rows || !rows.find(r=>r.owner===ME)) await pushOwner(ME);
    if(!rows || !rows.find(r=>r.owner==='shared')) await pushOwner('shared');
    setSync('ok','Synced');
    render();
    subscribe();
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) refreshRemote(); });
    window.addEventListener('online', refreshRemote);
  }catch(e){ setSync('off','Offline · saved here'); }
}
async function refreshRemote(){
  if(!sb) return;
  try{
    const {data:rows}=await sb.from('aab_state').select('*');
    (rows||[]).forEach(r=>{ const ts=Date.parse(r.updated_at)||0; if(ts>lastTs[r.owner]) applyRow(r.owner,r.data,ts); });
    safeRender();
  }catch(e){}
}
let chanRetry=null;
function subscribe(){
  const ch=sb.channel('aab-'+Math.random().toString(36).slice(2,8))
    .on('postgres_changes',{event:'*',schema:'public',table:'aab_state'}, p=>{
      const row=p.new; if(!row||!row.data) return;
      const ts=Date.parse(row.updated_at)||0;
      // ignore our own just-pushed change; apply everyone else's
      if(ts>lastTs[row.owner]){ applyRow(row.owner,row.data,ts); safeRender(); }
    })
    .subscribe(status=>{
      if(status==='SUBSCRIBED'){ clearTimeout(chanRetry); setSync('ok','Synced'); return; }
      if(['CHANNEL_ERROR','TIMED_OUT','CLOSED'].includes(status)){
        setSync('busy','Reconnecting…'); clearTimeout(chanRetry);
        chanRetry=setTimeout(()=>{ try{sb.removeChannel(ch);}catch(e){} subscribe(); refreshRemote(); }, 5000);
      }
    });
}

(function(){ let last=null; try{ last=localStorage.getItem(LS_USER); }catch(e){} if(last && CONFIG.accounts[last]) login(last); })();

/* Register the service worker (makes it installable + work offline). */
if('serviceWorker' in navigator){ window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
